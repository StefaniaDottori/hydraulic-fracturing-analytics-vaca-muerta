<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydraulic Fracturing Operations — Vaca Muerta | S. Dottori</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red:      #C0392B;
    --red-dark: #8B1A2F;
    --gold:     #D4A017;
    --dark:     #1C1C1E;
    --mid:      #2D2D2D;
    --gray:     #888;
    --light:    #F7F6F3;
    --white:    #FFFFFF;
    --border:   #E8E6E0;
    --text:     #1C1C1E;
    --text-sub: #888888;
    --font:     'DM Sans', sans-serif;
    --mono:     'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--light);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  .dash { max-width: 1100px; margin: 0 auto; }

  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-left: 16px;
    flex-shrink: 0;
  }
  .lang-btn {
    padding: 5px 12px;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    background: var(--white);
    color: var(--text-sub);
    border: none;
    border-right: 1px solid var(--border);
    transition: all 0.15s;
  }
  .lang-btn:last-child { border-right: none; }
  .lang-btn:hover { color: var(--red); }
  .lang-btn.active { background: var(--red); color: #fff; }

  .lang-toggle {
    display: flex;
    align-items: center;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-top: 8px;
  }
  .lang-btn {
    padding: 5px 13px;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 500;
    letter-spacing: 0.04em;
    cursor: pointer;
    background: var(--white);
    color: var(--text-sub);
    border: none;
    border-right: 1px solid var(--border);
    transition: all 0.15s;
  }
  .lang-btn:last-child { border-right: none; }
  .lang-btn:hover { color: var(--red); }
  .lang-btn.active { background: var(--red); color: #fff; }

  /* ── Header ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 2px solid var(--red);
  }
  .header-left h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.2;
  }
  .header-left p {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 4px;
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }
  .header-right {
    font-size: 11px;
    color: var(--text-sub);
    text-align: right;
    font-family: var(--mono);
    line-height: 1.6;
  }

  /* ── Filters ── */
  .filters {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .filter-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    margin-right: 4px;
  }
  .pill {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 12px;
    font-family: var(--font);
    cursor: pointer;
    background: var(--white);
    color: var(--text-sub);
    transition: all 0.15s ease;
    font-weight: 400;
  }
  .pill:hover { border-color: var(--red); color: var(--red); }
  .pill.active { background: var(--red); color: #fff; border-color: var(--red); font-weight: 500; }

  /* ── KPI Cards ── */
  .kpis {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .kpi {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    border-left: 3px solid var(--red);
  }
  .kpi-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    margin-bottom: 8px;
  }
  .kpi-value {
    font-size: 32px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .kpi-value sup {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-sub);
    margin-left: 3px;
    vertical-align: super;
  }
  .kpi-sub {
    font-size: 11px;
    color: var(--text-sub);
    margin-top: 6px;
    font-family: var(--mono);
  }

  /* ── Chart Cards ── */
  .chart-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
  }
  .chart-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .chart-sub {
    font-size: 11px;
    color: var(--text-sub);
    font-family: var(--mono);
    margin-bottom: 1rem;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 12px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-sub);
  }
  .leg-sq {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Layout ── */
  .chart-full { margin-bottom: 1.25rem; }
  .charts-bottom {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  /* ── Business Case Section ── */
  .bc-section {
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 2px solid var(--red);
  }
  .bc-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 12px;
  }
  .bc-section-title {
    font-size: 18px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .bc-section-title span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-sub);
    font-weight: 400;
    margin-left: 10px;
    letter-spacing: 0.02em;
  }
  .bc-btn-pdf {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 18px;
    background: var(--dark);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--font);
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.01em;
    transition: background 0.15s;
  }
  .bc-btn-pdf:hover { background: var(--red); }
  .bc-btn-pdf svg { flex-shrink: 0; }

  .bc-intro {
    background: var(--white);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red);
    border-radius: 10px;
    padding: 1.1rem 1.5rem;
    margin-bottom: 1.25rem;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
  }
  .bc-intro strong { color: var(--text); }

  .bc-kpis {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .bc-kpi {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
    text-align: center;
  }
  .bc-kpi-value {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: -0.03em;
    color: var(--red);
    line-height: 1;
    margin-bottom: 6px;
  }
  .bc-kpi-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    font-family: var(--mono);
  }

  .bc-findings {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 1.25rem;
  }
  .bc-findings-header {
    display: grid;
    grid-template-columns: 52px 160px 1fr 1fr;
    background: var(--dark);
    padding: 9px 18px;
    gap: 20px;
  }
  .bc-findings-header span {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.55);
    font-family: var(--mono);
  }
  .bc-finding-row {
    display: grid;
    grid-template-columns: 52px 160px 1fr 1fr;
    gap: 20px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    align-items: start;
    transition: background 0.1s;
  }
  .bc-finding-row:last-child { border-bottom: none; }
  .bc-finding-row:hover { background: #faf9f7; }
  .bc-finding-num {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--red);
    font-weight: 500;
    padding-top: 2px;
  }
  .bc-finding-insight {
    font-size: 12.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
  }
  .bc-finding-insight .bc-tag {
    display: inline-block;
    margin-top: 5px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 400;
    color: var(--red);
    background: rgba(192,57,43,0.07);
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.03em;
  }
  .bc-finding-explanation {
    font-size: 12px;
    color: var(--text);
    line-height: 1.65;
  }
  .bc-finding-explanation .bc-num {
    font-family: var(--mono);
    font-weight: 500;
    color: var(--text);
  }
  .bc-finding-cost {
    font-size: 12px;
    color: var(--text-sub);
    line-height: 1.65;
    border-left: 2px solid var(--gold);
    padding-left: 10px;
  }
  .bc-finding-cost strong {
    color: var(--text);
    font-weight: 500;
  }

  .bc-glossary {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 6px 10px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 1.25rem;
  }
  .bc-glossary-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    font-family: var(--mono);
    margin-right: 4px;
    flex-shrink: 0;
  }
  .bc-glossary-item {
    font-size: 11.5px;
    color: var(--text-sub);
    line-height: 1.5;
  }
  .bc-glossary-term {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 11px;
    color: var(--text);
    background: rgba(0,0,0,0.05);
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 4px;
  }
  .bc-glossary-sep {
    color: var(--border);
    font-size: 14px;
    flex-shrink: 0;
  }

  .bc-fm-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
    margin-top: 1.5rem;
  }
  .bc-fm-axiom {
    font-size: 11.5px;
    font-style: italic;
    color: var(--text-sub);
    font-family: var(--mono);
    border-left: 2px solid var(--red);
    padding-left: 10px;
    max-width: 480px;
    line-height: 1.5;
  }
  .bc-fm-intro {
    background: var(--dark);
    color: rgba(255,255,255,0.75);
    border-radius: 8px;
    padding: 14px 18px;
    font-size: 12.5px;
    line-height: 1.7;
    margin-bottom: 10px;
  }
  .bc-fm-intro strong { color: var(--white); }
  .bc-fm-intro em { color: var(--gold); font-style: normal; }
  .bc-fm-table { margin-bottom: 1.25rem; }
  .bc-fm-head-row {
    display: grid;
    grid-template-columns: 52px 150px 1fr 1fr 1fr;
    background: #2A2A2C;
    padding: 9px 18px;
    gap: 16px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.5);
    font-family: var(--mono);
  }
  .bc-fm-row {
    display: grid;
    grid-template-columns: 52px 150px 1fr 1fr 1fr;
    gap: 16px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    align-items: start;
    transition: background 0.1s;
  }
  .bc-fm-row:last-child { border-bottom: none; }
  .bc-fm-row:hover { background: #faf9f7; }
  .bc-fm-cell {
    font-size: 11.5px;
    color: var(--text-sub);
    line-height: 1.65;
  }
  .bc-fm-model {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10.5px;
    font-weight: 500;
    color: var(--white);
    background: var(--dark);
    padding: 1px 7px;
    border-radius: 3px;
    margin-right: 4px;
  }
  .bc-fm-validation { display: flex; flex-direction: column; gap: 8px; }
  .bc-fm-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--red-dark);
    background: rgba(192,57,43,0.08);
    border: 1px solid rgba(192,57,43,0.2);
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 5px;
    letter-spacing: 0.02em;
  }

  .bc-op-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 10px;
    margin-top: 1.5rem;
  }
  .bc-op-title {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .bc-op-sub {
    font-size: 11px;
    color: var(--text-sub);
    font-family: var(--mono);
    margin-left: 8px;
  }
  .bc-op-table { margin-bottom: 1.25rem; }
  .bc-op-head-row {
    display: grid;
    grid-template-columns: 52px 150px 1fr 1fr 1fr;
    background: var(--mid);
    padding: 9px 18px;
    gap: 16px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.55);
    font-family: var(--mono);
  }
  .bc-op-row {
    display: grid;
    grid-template-columns: 52px 150px 1fr 1fr 1fr;
    gap: 16px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    align-items: start;
    transition: background 0.1s;
  }
  .bc-op-row:last-child { border-bottom: none; }
  .bc-op-row:hover { background: #faf9f7; }
  .bc-op-cell {
    font-size: 11.5px;
    color: var(--text-sub);
    line-height: 1.65;
  }
  .bc-op-cell strong { color: var(--text); font-weight: 500; }
  .bc-op-equip { display: flex; flex-direction: column; gap: 7px; }
  .bc-op-tag {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    color: var(--dark);
    background: rgba(212,160,23,0.12);
    border: 1px solid rgba(212,160,23,0.3);
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 5px;
    letter-spacing: 0.02em;
  }

  .bc-bottom {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.25rem;
  }
  .bc-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.1rem 1.5rem;
  }
  .bc-card-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    font-family: var(--mono);
    margin-bottom: 10px;
  }
  .bc-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bc-list li {
    font-size: 12.5px;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 8px;
    line-height: 1.4;
  }
  .bc-list li::before {
    content: '▸';
    color: var(--red);
    font-size: 10px;
    margin-top: 2px;
    flex-shrink: 0;
  }

  .bc-cta {
    background: var(--dark);
    border-radius: 10px;
    padding: 1.1rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .bc-cta-left {
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    font-family: var(--mono);
    line-height: 1.8;
  }
  .bc-cta-left a {
    color: var(--gold);
    text-decoration: none;
  }
  .bc-cta-left a:hover { text-decoration: underline; }
  .bc-cta-right {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    text-align: right;
  }
  .bc-cta-right small {
    display: block;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    font-family: var(--mono);
    margin-top: 3px;
  }

  @media print {
    .filters, .bc-btn-pdf { display: none !important; }
    body { background: white; }
    .chart-card, .bc-findings, .bc-card, .bc-cta { break-inside: avoid; }
  }

  /* ── Footer ── */
  .footer {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-sub);
    font-family: var(--mono);
    line-height: 1.8;
  }

  @media (max-width: 720px) {
    .kpis { grid-template-columns: 1fr; }
    .charts-bottom { grid-template-columns: 1fr; }
    .header { flex-direction: column; align-items: flex-start; gap: 8px; }
  }

</head>
<body>
<div class="dash">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1 data-i18n="title">Hydraulic fracturing operations — Vaca Muerta</h1>
      <p data-i18n="subtitle">Completion data analytics &nbsp;·&nbsp; S. Dottori portfolio 2025</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;">
      <div class="header-right" data-i18n="header_right">
        40 wells &nbsp;·&nbsp; 1,255 frac stages &nbsp;·&nbsp; 24-month decline<br>
        TotalEnergies · Repsol · Chevron · YPF · Petrobras
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('es')">ES</button>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <span class="filter-label" data-i18n="filter_label">Formation</span>
    <button class="pill active" onclick="setFilter('all')" data-i18n="filter_all">All formations</button>
    <button class="pill" onclick="setFilter('Organico')">Organico</button>
    <button class="pill" onclick="setFilter('La Cocina')">La Cocina</button>
    <button class="pill" onclick="setFilter('Loma Amarilla')">Loma Amarilla</button>
  </div>

  <!-- KPIs -->
  <div class="kpis">
    <div class="kpi">
      <div class="kpi-label" data-i18n="kpi_ip_label">Avg IP — month 1</div>
      <div class="kpi-value" id="kpi-ip">681<sup>bopd</sup></div>
      <div class="kpi-sub" id="kpi-ip-sub">across 3 formations</div>
    </div>
    <div class="kpi">
      <div class="kpi-label" data-i18n="kpi_stages_label">Stages completed</div>
      <div class="kpi-value" id="kpi-stages">1,118</div>
      <div class="kpi-sub" id="kpi-stages-sub">9% screen-out rate</div>
    </div>
    <div class="kpi">
      <div class="kpi-label" data-i18n="kpi_hl_label">Avg fracture half-length</div>
      <div class="kpi-value" id="kpi-hl">211<sup>m</sup></div>
      <div class="kpi-sub" id="kpi-hl-sub">PDAT diagnostic median</div>
    </div>
  </div>

  <!-- Decline curve — full width -->
  <div class="chart-full">
    <div class="chart-card">
      <div class="chart-title" data-i18n="decline_title">Production decline by formation</div>
      <div class="chart-sub" data-i18n="decline_sub">Avg bopd per formation (mean across all wells in group) — Arps hyperbolic b=1.2, 24 months on production</div>

      <!-- 01 -->
      <div class="bc-finding-row">
        <span class="bc-finding-num">01</span>
        <div class="bc-finding-insight">
          <span data-i18n="f01_title">Fracturability ≠ Producibility</span>
          <span class="bc-tag" data-i18n="f01_tag">Orgánico vs La Cocina</span>
        </div>
        <div class="bc-finding-explanation" data-i18n="f01_exp">
          The Orgánico member has a brittleness index lower than Loma Amarilla, yet delivers the highest initial production — <span class="bc-num">907 bopd avg IP</span> — because its organic richness (<span class="bc-num">TOC 6.5%</span>) and matrix porosity (<span class="bc-num">ϕ 11.5%</span>) drive fluid storage and connectivity. La Cocina, despite being easier to fracture in isolation, is a ductile, organic-lean formation deposited in an anoxic environment: it breaks, but it doesn't flow. This analysis decouples the mechanical completion target from the actual production target, showing they are not the same zone.
        </div>
        <div class="bc-finding-cost" data-i18n="f01_cost">
          <strong>If you don't know this:</strong> completion engineers land laterals and concentrate stages in the most brittle intervals — often Loma Amarilla or La Cocina — chasing easy fractures. You get SRV without storage. Wells are completed in the wrong bench, capital is allocated to low-productivity zones, and the portfolio underperforms against type curves with no clear engineering explanation.
        </div>
      </div>

      <!-- 02 -->
      <div class="bc-finding-row">
        <span class="bc-finding-num">02</span>
        <div class="bc-finding-insight">
          <span data-i18n="f02_title">PDAT fracture half-length is the best predictor of IP</span>
          <span class="bc-tag">r² &gt; 0.70</span>
        </div>
        <div class="bc-finding-explanation" data-i18n="f02_exp">
          Cross-correlating PDAT diagnostic half-length against month-1 production across <span class="bc-num">431 frac stages</span> reveals a statistically significant positive relationship (<span class="bc-num">r² &gt; 0.70</span>). Half-length is the best available field-measurable proxy for Stimulated Reservoir Volume (SRV). A longer propped half-length means more reservoir contacted, more fluid pathways, higher early production. The relationship holds consistently across formations, making it a reliable pre-frac design lever: optimize for half-length, optimize for IP.
        </div>
        <div class="bc-finding-cost" data-i18n="f02_cost">
          <strong>If you don't know this:</strong> frac design is optimized for net pressure response or treating pressure targets rather than SRV. Teams pump more fluid and proppant without understanding which geometric parameter actually drives production. PDAT data exists in every well file but sits unanalyzed — a data asset generating zero value.
        </div>
      </div>

      <!-- 03 -->
      <div class="bc-finding-row">
        <span class="bc-finding-num">03</span>
        <div class="bc-finding-insight">
          <span data-i18n="f03_title">La Cocina has a 9% screen-out rate</span>
          <span class="bc-tag" data-i18n="f03_tag">highest across all formations</span>
        </div>
        <div class="bc-finding-explanation" data-i18n="f03_exp">
          La Cocina was deposited in an anoxic, deep-water environment with high clay content and low quartz cementation — a depositional context that produces a ductile, plastic rock. Under hydraulic load, fractures don't propagate cleanly: they tortue, branch, and close early, restricting slurry flow and leading to premature screen-out. At <span class="bc-num">9% screen-out rate</span> across <span class="bc-num">398 analyzed stages</span>, this formation requires a fundamentally different fluid system (lower viscosity, smaller mesh proppant) and a more conservative rate schedule than the cross-formation default design.
        </div>
        <div class="bc-finding-cost" data-i18n="f03_cost">
          <strong>If you don't know this:</strong> you apply the same frac recipe across all benches. In La Cocina, this means repeated screen-outs, coiled tubing interventions to clean out bridges, lost stages, and NPT that compounds across a multi-well pad. Each aborted stage is a direct cost. More critically, it becomes a safety risk: wellbore pressure buildup from screen-out events is a leading cause of equipment failures and surface incidents in operations.
        </div>
      </div>

      <!-- 04 -->
      <div class="bc-finding-row">
        <span class="bc-finding-num">04</span>
        <div class="bc-finding-insight">
          <span data-i18n="f04_title">La Cocina declines 2× faster than Orgánico</span>
          <span class="bc-tag">Di 12%/mo vs 6%/mo</span>
        </div>
        <div class="bc-finding-explanation" data-i18n="f04_exp">
          Fitting Arps hyperbolic decline curves (<span class="bc-num">b = 1.2</span>) to 24-month production data by formation shows a stark divergence: Orgánico maintains a decline rate of <span class="bc-num">Di = 6%/month</span>, while La Cocina loses production at <span class="bc-num">Di = 12%/month</span>. By month 12, a La Cocina well produces roughly half what an equivalent Orgánico well would. This is consistent with La Cocina's lower matrix porosity and faster pressure depletion in a ductile, low-storage system. The implication extends beyond production forecasting: it changes the EUR, the economic breakeven, and the optimal restimulation timing for each bench independently.
        </div>
        <div class="bc-finding-cost" data-i18n="f04_cost">
          <strong>If you don't know this:</strong> reserves are booked using a single basin-wide decline curve. La Cocina wells are systematically over-booked early in field life, with write-downs required as production data matures. Investors and partners receive misleading EUR estimates. Acquisition pricing based on blended type curves overpays for La Cocina-heavy assets — a material financial risk at portfolio scale.
        </div>
      </div>

        <!-- Fracture Models vs Reality -->
    <div class="bc-fm-header">
      <div>
        <span class="bc-op-title" data-i18n="fm_title">Fracture geometry — models vs. field reality</span>
        <span class="bc-op-sub" data-i18n="fm_sub">theoretical assumptions vs. what the data actually shows</span>
      </div>
      <div class="bc-fm-axiom">"Fracture geometry models are hypotheses. Production data is the only real validation."</div>
    </div>

    <div class="bc-fm-intro" data-i18n="fm_intro">
      Classic fracture models — <strong>PKN, KGD, radial</strong> — are analytical solutions built on idealized assumptions: homogeneous rock, contained fracture height, symmetric propagation, a single planar fracture. In the field, none of these hold. The rock has laminations, natural fractures, lithological variations every few meters, and stress contrasts that shift with depth. What we can actually <em>measure</em> after a treatment is always indirect — and that gap between model and reality is where the risk lives.
    </div>

    <div class="bc-findings bc-fm-table">
      <div class="bc-fm-head-row">
        <span>#</span>
        <span>Finding</span>
        <span data-i18n="fm_th_model">Model applied &amp; assumptions</span>
        <span data-i18n="fm_th_blind">What the model can't see</span>
        <span data-i18n="fm_th_used">What we used instead</span>
      </div>

      <!-- 01 -->
      <div class="bc-fm-row">
        <span class="bc-finding-num">01</span>
        <div class="bc-finding-insight" style="font-size:12px;">
          <span data-i18n="fm01_title">Fracturability ≠ Producibility</span>
          <span class="bc-tag" data-i18n="fm01_tag">PKN / brittleness index</span>
        </div>
        <div class="bc-fm-cell" data-i18n="fm01_model">
          <span class="bc-fm-model">PKN model</span> assumes a single vertical fracture with contained height propagating in a homogeneous, isotropic rock. Brittleness Index (BI) is used as the primary completion quality proxy — higher BI = better frac candidate. The model predicts longer half-lengths in brittle rock and designs stage placement accordingly.
        </div>
        <div class="bc-fm-cell" data-i18n="fm01_blind">
          PKN cannot account for organic content, matrix porosity, or fluid storage capacity. A high-BI formation that breaks cleanly still needs somewhere to store and flow hydrocarbons. In Vaca Muerta, Orgánico has lower BI than Loma Amarilla but higher TOC and porosity — the model ranks it as a worse frac target when it is actually the best producer.
        </div>
        <div class="bc-fm-cell bc-fm-validation" data-i18n="fm01_used">
          <span class="bc-fm-tag">Production data</span> Month-1 IP by formation — the only post-treatment proof that the right zone was targeted.<br>
          <span class="bc-fm-tag">Geological props</span> TOC, porosity, and permeability per bench correlated against IP to rank true completion quality.
        </div>
      </div>

      <!-- 02 -->
      <div class="bc-fm-row">
        <span class="bc-finding-num">02</span>
        <div class="bc-finding-insight" style="font-size:12px;">
          <span data-i18n="fm02_title">PDAT half-length predicts IP</span>
          <span class="bc-tag" data-i18n="fm02_tag">model vs. diagnostic</span>
        </div>
        <div class="bc-fm-cell" data-i18n="fm02_model">
          <span class="bc-fm-model">PKN / numerical simulators</span> compute a theoretical fracture half-length from fluid volume, viscosity, and rock mechanical properties. This modeled half-length is what engineers use to claim SRV. It is never directly observed — it is a simulation output with significant uncertainty bounds depending on input quality.
        </div>
        <div class="bc-fm-cell" data-i18n="fm02_blind">
          The model assumes perfect proppant transport, no near-wellbore tortuosity, and no fracture complexity. In reality, proppant settles, fractures branch, and part of the designed half-length is never propped. The gap between modeled and PDAT-measured half-length is the single largest source of SRV overestimation in unconventional completions — and it directly explains IP variance between wells with similar designs.
        </div>
        <div class="bc-fm-cell bc-fm-validation" data-i18n="fm02_used">
          <span class="bc-fm-tag">PDAT diagnostic</span> Post-frac pressure transient analysis — gives measured half-length and conductivity, not simulated.<br>
          <span class="bc-fm-tag">Statistical correlation</span> r² &gt; 0.70 between PDAT half-length and IP across 431 stages — empirical, field-validated.
        </div>
      </div>

      <!-- 03 -->
      <div class="bc-fm-row">
        <span class="bc-finding-num">03</span>
        <div class="bc-finding-insight" style="font-size:12px;">
          <span data-i18n="fm03_title">La Cocina: 9% screen-out rate</span>
          <span class="bc-tag" data-i18n="fm03_tag">KGD / height containment failure</span>
        </div>
        <div class="bc-fm-cell" data-i18n="fm03_model">
          <span class="bc-fm-model">KGD model</span> assumes a fracture with limited height extension and uniform pressure distribution along its length — appropriate for short, contained fractures in competent rock. For La Cocina, designs based on KGD assume the fracture stays within the target interval, allowing the full slurry volume to be placed before reaching screenout conditions.
        </div>
        <div class="bc-fm-cell" data-i18n="fm03_blind">
          La Cocina's ductile, high-clay mineralogy means fractures do not propagate cleanly. Instead of a contained planar fracture, the treatment creates complex, branching geometry with high near-wellbore tortuosity. Pressure builds faster than the model predicts, proppant bridges before the design volume is placed, and the stage screens out. KGD has no mechanism to model this — it cannot simulate ductile fracture complexity or tortuosity-driven pressure escalation.
        </div>
        <div class="bc-fm-cell bc-fm-validation" data-i18n="fm03_used">
          <span class="bc-fm-tag">Screen-out rate</span> 9% observed across 398 La Cocina stages — empirical evidence that model-based designs systematically fail in this formation.<br>
          <span class="bc-fm-tag">PDAT half-length</span> Shortest measured half-length (163 m avg) confirms fracture complexity and limited propagation despite treatment volume.
        </div>
      </div>

      <!-- 04 -->
      <div class="bc-fm-row">
        <span class="bc-finding-num">04</span>
        <div class="bc-finding-insight" style="font-size:12px;">
          <span data-i18n="fm04_title">La Cocina declines 2× faster</span>
          <span class="bc-tag" data-i18n="fm04_tag">radial model / EUR overestimation</span>
        </div>
        <div class="bc-fm-cell" data-i18n="fm04_model">
          <span class="bc-fm-model">Radial / pseudo-radial flow models</span> underpin standard Arps decline curve fitting when formation-specific parameters are unavailable. A single basin-wide b-exponent and Di are applied uniformly, assuming that all formations drain similarly once fractured. This is the default approach when no formation-differentiated analysis exists.
        </div>
        <div class="bc-fm-cell" data-i18n="fm04_blind">
          La Cocina's ductile matrix has fundamentally different pressure depletion mechanics than Orgánico. A radial model applied uniformly across both formations cannot capture the 2× difference in decline rate. Microseismic data, where available, would show fracture complexity in La Cocina — but even without it, the production signature is unambiguous: the formation depletes faster, and no theoretical model predicted it. Only production data revealed it.
        </div>
        <div class="bc-fm-cell bc-fm-validation" data-i18n="fm04_used">
          <span class="bc-fm-tag">Arps hyperbolic fit</span> Formation-differentiated decline modeling: Di 12%/mo (La Cocina) vs 6%/mo (Orgánico) — b = 1.2, 24-month dataset.<br>
          <span class="bc-fm-tag">Production data</span> The only real post-treatment validation available — no microseismic, no tracers, no imaging. Data speaks.
        </div>
      </div>

    </div>

        <span class="bc-op-title" data-i18n="op_title">Operational cost of not knowing</span>

    <div class="bc-findings bc-op-table">
      <div class="bc-op-head-row">
        <span>#</span>
        <span>Finding</span>
        <span data-i18n="op_th_field">Field consequence</span>
        <span data-i18n="op_th_npt">NPT &amp; standby exposure</span>
        <span data-i18n="op_th_equip">Equipment &amp; chemical impact</span>
      </div>

      <!-- 01 -->
      <div class="bc-op-row">
        <span class="bc-finding-num">01</span>
        <div class="bc-finding-insight" style="font-size:12px;">
          <span data-i18n="op01_title">Fracturability ≠ Producibility</span>
          <span class="bc-tag" data-i18n="op01_tag">wrong bench selection</span>
        </div>
        <div class="bc-op-cell" data-i18n="op01_field">
          Stages are pumped in the wrong bench — mechanically responsive but geologically non-productive. Fluid and proppant are placed in a zone that breaks easily but doesn't flow. The completion is technically successful, the well is not.
        </div>
        <div class="bc-op-cell" data-i18n="op01_npt">
          No immediate NPT event, but the standby cost is deferred: restimulation or recompletion jobs months later to target the productive bench. Mobilization of perforating crews, plug-and-perf equipment, and wireline units for a job that shouldn't have been necessary.
        </div>
        <div class="bc-op-cell bc-op-equip" data-i18n="op01_equip">
          <span class="bc-op-tag">Proppant</span> Full proppant volume pumped into low-productivity zone — sunk cost with no recovery.<br>
          <span class="bc-op-tag">Fluid system</span> Crosslinked or slickwater design optimized for wrong rock — wasted chemical inventory.
        </div>
      </div>

      <!-- 02 -->
      <div class="bc-op-row">
        <span class="bc-finding-num">02</span>
        <div class="bc-finding-insight" style="font-size:12px;">
          <span data-i18n="op02_title">PDAT half-length predicts IP</span>
          <span class="bc-tag" data-i18n="op02_tag">underutilized diagnostic</span>
        </div>
        <div class="bc-op-cell" data-i18n="op02_field">
          Without half-length as a design target, pumping schedules are not optimized for SRV. Engineers either over-pump (excess fluid, pressure buildup risk) or under-pump (insufficient fracture propagation, low IP). Both outcomes generate unnecessary field events.
        </div>
        <div class="bc-op-cell" data-i18n="op02_npt">
          Over-pumping scenarios: unplanned pressure exceedances trigger emergency rate reductions — <strong>standby hours</strong> while the crew stabilizes wellbore pressure and evaluates surface equipment integrity. PDAT data already exists in every well file but requires analyst time to interpret.
        </div>
        <div class="bc-op-cell bc-op-equip" data-i18n="op02_equip">
          <span class="bc-op-tag">HHP (hydraulic horsepower)</span> Excess pump rate requires additional HHP on location — idle pump trucks on standby generate day-rate cost.<br>
          <span class="bc-op-tag">Friction reducers</span> Higher-than-needed slurry rates require increased FR concentration to control treating pressure.
        </div>
      </div>

      <!-- 03 -->
      <div class="bc-op-row">
        <span class="bc-finding-num">03</span>
        <div class="bc-finding-insight" style="font-size:12px;">
          <span data-i18n="op03_title">La Cocina: 9% screen-out rate</span>
          <span class="bc-tag" data-i18n="op03_tag">highest operational risk</span>
        </div>
        <div class="bc-op-cell" data-i18n="op03_field">
          A screen-out event in La Cocina means the proppant slurry bridges in the near-wellbore or fracture throat before the designed volume is placed. The stage is aborted. The wellbore must be cleaned out before the next stage can begin — adding unplanned hours to the pad schedule.
        </div>
        <div class="bc-op-cell" data-i18n="op03_npt">
          <strong>Each screen-out event generates:</strong> coiled tubing (CT) mobilization for bridge cleanout (4–8 hrs typical NPT), pump shutdown and wellbore pressure bleed-off time, crew standby while CT unit rigged in, and potential re-perforation if the interval is damaged. At 9% rate across a 15-stage lateral, expect 1–2 CT interventions per well.
        </div>
        <div class="bc-op-cell bc-op-equip" data-i18n="op03_equip">
          <span class="bc-op-tag">Extra pump unit</span> Standby high-pressure pump required on location for pressure control during screen-out event management.<br>
          <span class="bc-op-tag">Friction reducers</span> Increased FR dosage needed to reduce tortuosity and near-wellbore friction — unplanned chemical volume.<br>
          <span class="bc-op-tag">Coiled tubing unit</span> CT mobilization per screen-out event — day-rate plus crew standby hours.<br>
          <span class="bc-op-tag">Surface iron</span> Pressure spike risk during screen-out requires check of all surface iron integrity — potential inspection downtime.
        </div>
      </div>

      <!-- 04 -->
      <div class="bc-op-row">
        <span class="bc-finding-num">04</span>
        <div class="bc-finding-insight" style="font-size:12px;">
          <span data-i18n="op04_title">La Cocina declines 2× faster</span>
          <span class="bc-tag" data-i18n="op04_tag">reserves &amp; restimulation timing</span>
        </div>
        <div class="bc-op-cell" data-i18n="op04_field">
          Faster decline means the economic limit is reached sooner than planned. Restimulation or infill drilling decisions must be made earlier. If operations teams are working from a single basin type curve, La Cocina wells trigger unplanned interventions — mobilizing equipment that wasn't scheduled in the annual operations plan.
        </div>
        <div class="bc-op-cell" data-i18n="op04_npt">
          Unplanned restimulation jobs carry full standby overhead: pump fleet, blender, data acquisition unit, and wireline crew must be re-mobilized outside the scheduled pad campaign. Off-cycle mobilization is consistently more expensive than planned-sequence operations. <strong>Standby hours accumulate</strong> during logistics coordination for an unscheduled intervention.
